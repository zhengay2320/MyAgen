models:
  - id: fake_detection
    task: object_detection
    backend: fake
    framework: numpy
    weights: null
  - id: fake_oriented_detection
    task: oriented_detection
    backend: fake
    framework: numpy
    weights: null
  - id: fake_segmentation
    task: semantic_segmentation
    backend: fake
    framework: numpy
    weights: null
  - id: fake_instance
    task: instance_segmentation
    backend: fake
    framework: numpy
    weights: null
  - id: fake_change
    task: change_detection
    backend: fake
    framework: numpy
    weights: null
  - id: fake_super_resolution
    task: super_resolution
    backend: fake
    framework: numpy
    weights: null
  - id: fake_external_detection
    task: object_detection
    backend: fake_external
    framework: numpy
    runner: subprocess
    conda_env: null
    entrypoint: rs_service.workers.fake_external_infer
    runner_timeout_sec: 120
    weights: null
  - id: fake_external_oriented_detection
    task: oriented_detection
    backend: fake_external
    framework: numpy
    runner: subprocess
    conda_env: null
    entrypoint: rs_service.workers.fake_external_infer
    runner_timeout_sec: 120
    weights: null
  - id: fake_external_segmentation
    task: semantic_segmentation
    backend: fake_external
    framework: numpy
    runner: subprocess
    conda_env: null
    entrypoint: rs_service.workers.fake_external_infer
    runner_timeout_sec: 120
    weights: null
  - id: fake_external_instance_segmentation
    task: instance_segmentation
    backend: fake_external
    framework: numpy
    runner: subprocess
    conda_env: null
    entrypoint: rs_service.workers.fake_external_infer
    runner_timeout_sec: 120
    weights: null
  - id: fake_external_change_detection
    task: change_detection
    backend: fake_external
    framework: numpy
    runner: subprocess
    conda_env: null
    entrypoint: rs_service.workers.fake_external_infer
    runner_timeout_sec: 120
    weights: null
  - id: fake_external_super_resolution
    task: super_resolution
    backend: fake_external
    framework: numpy
    runner: subprocess
    conda_env: null
    entrypoint: rs_service.workers.fake_external_infer
    runner_timeout_sec: 120
    weights: null
    scale: 2
  - id: fake-yolo-sahi
    task: object_detection
    backend: fake
    framework: ultralytics+sahi
    weights: null
  - id: yolo_detection
    task: object_detection
    backend: ultralytics
    framework: ultralytics
    weights: weights/yolo_detection.pt
    confidence_threshold: 0.25
    iou_threshold: 0.45
    device: cpu
    imgsz: 1024
  - id: sahi_yolo_detection
    task: object_detection
    backend: sahi
    framework: sahi+ultralytics
    weights: weights/yolo_detection.pt
    confidence_threshold: 0.25
    device: cpu
    slice_height: 512
    slice_width: 512
    overlap_ratio: 0.2
  - id: fake-mmrotate
    task: oriented_detection
    backend: fake
    framework: mmrotate
    weights: null
  - id: mmrotate_dota_oriented
    task: oriented_detection
    backend: mmrotate
    framework: mmrotate
    config: external/mmrotate/configs/oriented_rcnn/oriented-rcnn_dota.py
    checkpoint: weights/mmrotate_dota_oriented.pth
    device: cpu
    angle_unit: auto
    classes:
      - plane
      - ship
      - storage-tank
      - baseball-diamond
      - tennis-court
  - id: fake-mmseg
    task: semantic_segmentation
    backend: fake
    framework: mmsegmentation
    weights: null
  - id: mmseg_segformer_landcover
    task: semantic_segmentation
    backend: mmseg
    framework: mmsegmentation
    config: external/mmsegmentation/configs/segformer/segformer_landcover.py
    checkpoint: weights/mmseg_segformer_landcover.pth
    device: cpu
    classes:
      - background
      - landcover
    palette:
      - [0, 0, 0]
      - [60, 180, 75]
  - id: mmseg_deeplab_building
    task: semantic_segmentation
    backend: mmseg
    framework: mmsegmentation
    config: external/mmsegmentation/configs/deeplabv3/deeplab_building.py
    checkpoint: weights/mmseg_deeplab_building.pth
    device: cpu
    classes:
      - background
      - building
    palette:
      - [0, 0, 0]
      - [230, 25, 75]
  - id: fake-mmdet-instance
    task: instance_segmentation
    backend: fake
    framework: mmdetection
    weights: null
  - id: mmdet_maskrcnn_instance
    task: instance_segmentation
    backend: mmdet
    framework: mmdetection
    config: external/mmdetection/configs/mask_rcnn/mask-rcnn_remote_sensing.py
    checkpoint: weights/mmdet_maskrcnn_instance.pth
    device: cpu
    classes:
      - background
      - target
  - id: yolo_instance_segmentation
    task: instance_segmentation
    backend: ultralytics
    framework: ultralytics
    weights: weights/yolo_instance.pt
    confidence_threshold: 0.25
    iou_threshold: 0.45
    device: cpu
    imgsz: 1024
  - id: fake-opencd
    task: change_detection
    backend: fake
    framework: open-cd
    weights: null
  - id: opencd_changer_building
    task: change_detection
    backend: opencd
    framework: open-cd
    config: external/opencd/configs/changer/changer_building.py
    checkpoint: weights/opencd_changer_building.pth
    device: cpu
    threshold: 0.5
  - id: opencd_changeformer_landcover
    task: change_detection
    backend: opencd
    framework: open-cd
    config: external/opencd/configs/changeformer/changeformer_landcover.py
    checkpoint: weights/opencd_changeformer_landcover.pth
    device: cpu
    threshold: 0.5
  - id: fake-sr
    task: super_resolution
    backend: fake
    framework: basicsr/mmagic/swinir
    weights: null
  - id: swinir_x2
    task: super_resolution
    backend: swinir
    framework: swinir/torch
    checkpoint: weights/swinir_x2.pth
    scale: 2
    device: cpu
  - id: swinir_x4
    task: super_resolution
    backend: swinir
    framework: swinir/torch
    checkpoint: weights/swinir_x4.pth
    scale: 4
    device: cpu
  - id: basicsr_x4
    task: super_resolution
    backend: basicsr
    framework: basicsr
    config: external/basicsr/options/sr_x4.yml
    checkpoint: weights/basicsr_x4.pth
    scale: 4
    device: cpu
  - id: mmagic_sr_stub
    task: super_resolution
    backend: mmagic
    framework: mmagic
    config: external/mmagic/configs/sr/sr_stub.py
    checkpoint: weights/mmagic_sr_stub.pth
    scale: 4
    device: cpu
  - id: yolo_detection_subprocess
    task: object_detection
    backend: ultralytics
    framework: ultralytics
    runner: subprocess
    conda_env: rs-mcp-yolo
    entrypoint: rs_service.workers.yolo_infer
    runner_timeout_sec: 600
    weights: weights/yolo_detection.pt
    confidence_threshold: 0.25
    iou_threshold: 0.45
    device: cpu
    imgsz: 1024
  - id: sahi_yolo_detection_subprocess
    task: object_detection
    backend: sahi
    framework: sahi+ultralytics
    runner: subprocess
    conda_env: rs-mcp-yolo
    entrypoint: rs_service.workers.sahi_yolo_infer
    runner_timeout_sec: 600
    weights: weights/yolo_detection.pt
    confidence_threshold: 0.25
    device: cpu
    slice_height: 512
    slice_width: 512
    overlap_ratio: 0.2
  - id: yolo_instance_segmentation_subprocess
    task: instance_segmentation
    backend: ultralytics
    framework: ultralytics
    runner: subprocess
    conda_env: rs-mcp-yolo
    entrypoint: rs_service.workers.yolo_infer
    runner_timeout_sec: 600
    weights: weights/yolo_instance.pt
    confidence_threshold: 0.25
    iou_threshold: 0.45
    device: cpu
    imgsz: 1024
  - id: mmseg_segformer_landcover_subprocess
    task: semantic_segmentation
    backend: mmseg
    framework: mmsegmentation
    runner: subprocess
    conda_env: rs-mcp-openmmlab
    entrypoint: rs_service.workers.mmseg_infer
    runner_timeout_sec: 600
    config: external/mmsegmentation/configs/segformer/segformer_landcover.py
    checkpoint: weights/mmseg_segformer_landcover.pth
    device: cpu
    classes:
      - background
      - landcover
    palette:
      - [0, 0, 0]
      - [60, 180, 75]
  - id: mmdet_maskrcnn_instance_subprocess
    task: instance_segmentation
    backend: mmdet
    framework: mmdetection
    runner: subprocess
    conda_env: rs-mcp-openmmlab
    entrypoint: rs_service.workers.mmdet_infer
    runner_timeout_sec: 600
    config: external/mmdetection/configs/mask_rcnn/mask-rcnn_remote_sensing.py
    checkpoint: weights/mmdet_maskrcnn_instance.pth
    device: cpu
    classes:
      - background
      - target
  - id: mmrotate_dota_oriented_subprocess
    task: oriented_detection
    backend: mmrotate
    framework: mmrotate
    runner: subprocess
    conda_env: rs-mcp-openmmlab
    entrypoint: rs_service.workers.mmrotate_infer
    runner_timeout_sec: 600
    config: external/mmrotate/configs/oriented_rcnn/oriented-rcnn_dota.py
    checkpoint: weights/mmrotate_dota_oriented.pth
    device: cpu
    angle_unit: auto
    classes:
      - plane
      - ship
      - storage-tank
      - baseball-diamond
      - tennis-court
  - id: opencd_changer_building_subprocess
    task: change_detection
    backend: opencd
    framework: open-cd
    runner: subprocess
    conda_env: rs-mcp-opencd
    entrypoint: rs_service.workers.opencd_infer
    runner_timeout_sec: 600
    config: external/opencd/configs/changer/changer_building.py
    checkpoint: weights/opencd_changer_building.pth
    device: cpu
    threshold: 0.5
  - id: swinir_x4_subprocess
    task: super_resolution
    backend: swinir
    framework: swinir/torch
    runner: subprocess
    conda_env: rs-mcp-sr
    entrypoint: rs_service.workers.swinir_infer
    runner_timeout_sec: 600
    checkpoint: weights/swinir_x4.pth
    scale: 4
    device: cpu

weight_roots:
  local: workspace/models
  object_detection: workspace/models/ultralytics
  oriented_detection: workspace/models/mmrotate
  semantic_segmentation: workspace/models/mmsegmentation
  instance_segmentation: workspace/models/mmdetection
  change_detection: workspace/models/opencd
  super_resolution: workspace/models/super_resolution
